<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FebryJW999 - API Documentation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="header-title">FebryJW999 - API Documentation</div>

        <div class="endpoint-card active" id="apiCard">
            <div class="endpoint-header" onclick="toggleCard()">
                <div class="endpoint-title-row">
                    <span class="badge-get">GET</span>
                    <span class="endpoint-title">Youtube Play MP3</span>
                    <svg class="chevron" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/>
                    </svg>
                </div>
                <div class="endpoint-path-row">
                    /api/v1/youtube/ytplaymp3
                </div>
            </div>

            <div class="endpoint-body">
                
                <div class="endpoint-description">
                    Endpoint ini dipakai buat nyari dan muter audio dari YouTube berdasarkan keyword atau judul lagunya.
                </div>

                <div class="section-title">
                    <svg class="icon-link" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1.002 1.002 0 0 0-.154.199 2 2 0 0 1 .861 3.337L6.88 11.45a2 2 0 1 1-2.83-2.83l.793-.792a4.018 4.018 0 0 1-.128-1.287z"/>
                        <path d="M6.586 4.672A3 3 0 0 0 7.414 9.5l.775-.776a2 2 0 0 1-.896-3.346L9.12 3.55a2 2 0 1 1 2.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 1 0-4.243-4.243L6.586 4.672z"/>
                    </svg>
                    ENDPOINT URL
                </div>

                <div class="code-block-container">
                    <div class="code-content" id="urlContent">https://febryjw-api.vercel.app/api/v1/youtube/ytplaymp3?query=</div>
                    <button class="copy-btn" id="copyBtn" onclick="copyApiUrl()">Copy</button>
                </div>

            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
